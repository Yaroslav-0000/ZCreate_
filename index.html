<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ZCreate - ТЕКСТУРЫ И ОПТИМИЗАЦИЯ</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; touch-action: none; }
    #joystick-area {
      position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px;
      background: rgba(255,255,255,0.2); border-radius: 60px; backdrop-filter: blur(5px);
      border: 2px solid rgba(255,255,255,0.3); z-index: 30;
    }
    #joystick-handle {
      position: absolute; width: 50px; height: 50px; background: rgba(255,255,255,0.8);
      border-radius: 25px; top: 35px; left: 35px; box-shadow: 0 0 10px rgba(0,0,0,0.3);
      pointer-events: none;
    }
    #flight-buttons {
      position: absolute; bottom: 30px; right: 30px; display: flex; flex-direction: column;
      gap: 15px; z-index: 30;
    }
    .flight-btn {
      width: 70px; height: 70px; background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.5);
      border-radius: 35px; color: white; font-size: 24px; display: flex; align-items: center;
      justify-content: center; backdrop-filter: blur(5px); user-select: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    canvas { touch-action: none; display: block; }
    #debug {
      position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7);
      padding: 5px; font-size: 12px; z-index: 100; pointer-events: none; border-radius: 5px;
    }
    #pc-controls {
      position: absolute; top: 10px; right: 10px; color: white; background: rgba(0,0,0,0.7);
      padding: 5px; font-size: 12px; z-index: 100; pointer-events: none; border-radius: 5px;
    }
    #chunk-info {
      position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
      color: white; background: rgba(0,0,0,0.7); padding: 5px 15px; font-size: 14px;
      z-index: 100; pointer-events: none; border-radius: 20px;
    }
    #save-button {
      position: absolute; top: 70px; right: 10px; background: rgba(0,100,200,0.9);
      color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 12px;
      cursor: pointer; z-index: 100; backdrop-filter: blur(5px);
    }
    #inventory-toggle {
      position: absolute; top: 100px; right: 10px; background: rgba(150,100,0,0.9);
      color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 12px;
      cursor: pointer; z-index: 100;
    }
    #inventory-panel {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 500px; height: 300px; background: rgba(30,30,30,0.95); backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.3); border-radius: 10px; display: none;
      flex-direction: column; z-index: 200; color: white;
    }
    #inventory-panel.visible { display: flex; }
    #inventory-tabs {
      display: flex; gap: 5px; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    .inventory-tab {
      padding: 5px 15px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 5px; cursor: pointer; color: white; font-size: 12px;
    }
    .inventory-tab.active { background: rgba(100,150,255,0.5); }
    #inventory-content {
      flex: 1; padding: 10px; display: grid; grid-template-columns: repeat(6, 1fr);
      gap: 5px; overflow-y: auto;
    }
    .inventory-slot {
      aspect-ratio: 1; background: rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.2);
      border-radius: 5px; display: flex; flex-direction: column; align-items: center;
      justify-content: center; cursor: pointer; position: relative; font-size: 10px;
    }
    .inventory-slot:hover { background: rgba(100,100,100,0.5); }
    .inventory-slot.selected { border-color: #ffaa00; background: rgba(255,170,0,0.2); }
    .slot-icon { font-size: 20px; }
    .slot-count { position: absolute; bottom: 2px; right: 5px; font-size: 10px; color: #aaa; }
    #hotbar {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 5px; background: rgba(0,0,0,0.6); padding: 5px;
      border-radius: 10px; z-index: 150;
    }
    .hotbar-slot {
      width: 40px; height: 40px; background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2); border-radius: 5px; display: flex;
      align-items: center; justify-content: center; position: relative; cursor: pointer;
    }
    .hotbar-slot.selected { border-color: #ffaa00; background: rgba(255,170,0,0.2); }
    .hotbar-slot .slot-icon { font-size: 16px; }
  </style>
</head>
<body>
  <div id="debug"></div>
  <div id="pc-controls">WASD+мышь | ЛКМ сломать | ПКМ поставить | I инвентарь</div>
  <div id="chunk-info"></div>
  
  <button id="save-button">💾</button>
  <button id="inventory-toggle">🎒</button>
  
  <div id="inventory-panel">
    <div id="inventory-tabs"></div>
    <div id="inventory-content"></div>
  </div>
  
  <div id="hotbar"></div>
  
  <div id="joystick-area"><div id="joystick-handle"></div></div>
  <div id="flight-buttons">
    <div class="flight-btn" id="btn-up">⬆️</div>
    <div class="flight-btn" id="btn-down">⬇️</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    (function() {
      // ==================== ОПТИМИЗАЦИИ ====================
      const fpsLimit = 30;
      let lastFrame = 0;
      
      // Пул векторов
      const vecPool = [];
      for (let i = 0; i < 10; i++) vecPool.push(new THREE.Vector3());
      function getVec() { return vecPool.pop() || new THREE.Vector3(); }
      function freeVec(v) { vecPool.push(v); }

      // ==================== РЕЕСТРЫ ====================
      const Registry = { blocks: {}, items: {}, tabs: {} };
      
      function registerTab(id, name, icon) { Registry.tabs[id] = { id, name, icon, items: [] }; }
      function registerItem(id, options) { 
        Registry.items[id] = { id, ...options }; 
        if (options.tab) Registry.tabs[options.tab]?.items.push(id);
      }
      function registerBlock(id, options) { 
        Registry.blocks[id] = { id, ...options };
        registerItem(id, { 
          name: options.name, 
          icon: options.icon, 
          tab: options.tab, 
          stack: 64, 
          blockId: id, 
          type: 'block' 
        });
      }
      
      registerTab('building', 'Стройка', '🏗️');
      registerTab('nature', 'Природа', '🌿');
      
      // Регистрируем блоки с текстурами
      registerBlock('stone', { 
        name: 'Камень', 
        icon: '🪨', 
        tab: 'building', 
        textures: {
          top: 'stone.png', bottom: 'stone.png', left: 'stone.png',
          right: 'stone.png', front: 'stone.png', back: 'stone.png'
        }
      });
      
      registerBlock('grass', { 
        name: 'Трава', 
        icon: '🌱', 
        tab: 'nature',
        textures: {
          top: 'grass_block_top.png', bottom: 'dirt.png',
          left: 'grass_block_side.png', right: 'grass_block_side.png',
          front: 'grass_block_side.png', back: 'grass_block_side.png'
        }
      });
      
      registerBlock('dirt', { 
        name: 'Земля', 
        icon: '🟫', 
        tab: 'nature',
        textures: {
          top: 'dirt.png', bottom: 'dirt.png', left: 'dirt.png',
          right: 'dirt.png', front: 'dirt.png', back: 'dirt.png'
        }
      });
      
      registerItem('stick', { name: 'Палка', icon: '🥢', tab: 'building', stack: 64, type: 'item' });

      // ==================== THREE ====================
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
      const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
      document.body.appendChild(renderer.domElement);

      // Загружаем позицию
      try {
        const saved = localStorage.getItem('pos');
        if (saved) {
          const p = JSON.parse(saved);
          camera.position.set(p.x, p.y, p.z);
        } else camera.position.set(8, 20, 8);
      } catch { camera.position.set(8, 20, 8); }

      // ==================== ТЕКСТУРЫ (загружаем 1 раз) ====================
      const loader = new THREE.TextureLoader();
      const textureCache = {};
      
      function getTexture(path) {
        if (!path) return null;
        if (!textureCache[path]) {
          try {
            const tex = loader.load(path);
            tex.magFilter = THREE.NearestFilter;
            tex.minFilter = THREE.NearestFilter;
            tex.generateMipmaps = false;
            textureCache[path] = tex;
          } catch {
            textureCache[path] = null;
          }
        }
        return textureCache[path];
      }

      // ==================== МАТЕРИАЛЫ (создаем один раз на каждый тип блока) ====================
      const materialCache = {};
      
      function getMaterialsForBlock(blockId) {
        if (materialCache[blockId]) return materialCache[blockId];
        
        const block = Registry.blocks[blockId];
        if (!block) return null;
        
        const materials = [
          new THREE.MeshBasicMaterial({ map: getTexture(block.textures.right) }),
          new THREE.MeshBasicMaterial({ map: getTexture(block.textures.left) }),
          new THREE.MeshBasicMaterial({ map: getTexture(block.textures.top) }),
          new THREE.MeshBasicMaterial({ map: getTexture(block.textures.bottom) }),
          new THREE.MeshBasicMaterial({ map: getTexture(block.textures.front) }),
          new THREE.MeshBasicMaterial({ map: getTexture(block.textures.back) })
        ];
        
        materialCache[blockId] = materials;
        return materials;
      }

      // ==================== ИНВЕНТАРЬ ====================
      let inventory = {
        hotbar: Array(8).fill(null).map(() => ({ item: null, count: 0 })),
        selectedHotbar: 0
      };
      
      try {
        const saved = localStorage.getItem('inv');
        if (saved) inventory = JSON.parse(saved);
        else {
          inventory.hotbar[0] = { item: 'grass', count: 64 };
          inventory.hotbar[1] = { item: 'dirt', count: 64 };
          inventory.hotbar[2] = { item: 'stone', count: 64 };
        }
      } catch {}

      let currentTab = 'building';
      let inventoryVisible = false;

      function updateInventoryUI() {
        const tabs = document.getElementById('inventory-tabs');
        const content = document.getElementById('inventory-content');
        const hotbar = document.getElementById('hotbar');
        
        tabs.innerHTML = '';
        Object.values(Registry.tabs).forEach(tab => {
          const el = document.createElement('div');
          el.className = `inventory-tab ${currentTab === tab.id ? 'active' : ''}`;
          el.innerHTML = `${tab.icon} ${tab.name}`;
          el.onclick = () => { currentTab = tab.id; updateInventoryUI(); };
          tabs.appendChild(el);
        });
        
        content.innerHTML = '';
        Registry.tabs[currentTab]?.items.forEach(itemId => {
          const item = Registry.items[itemId];
          const el = document.createElement('div');
          el.className = 'inventory-slot';
          el.innerHTML = `<div class="slot-icon">${item.icon}</div><div>${item.name}</div>`;
          el.onclick = () => {
            for (let i = 0; i < inventory.hotbar.length; i++) {
              if (!inventory.hotbar[i].item) {
                inventory.hotbar[i] = { item: itemId, count: 64 };
                updateInventoryUI();
                return;
              }
            }
          };
          content.appendChild(el);
        });
        
        hotbar.innerHTML = '';
        inventory.hotbar.forEach((slot, i) => {
          const el = document.createElement('div');
          el.className = `hotbar-slot ${inventory.selectedHotbar === i ? 'selected' : ''}`;
          if (slot.item) {
            const item = Registry.items[slot.item];
            el.innerHTML = `<div class="slot-icon">${item.icon}</div><div class="slot-count">${slot.count}</div>`;
          }
          el.onclick = () => { inventory.selectedHotbar = i; updateInventoryUI(); };
          hotbar.appendChild(el);
        });
      }

      function getCurrentItem() { return inventory.hotbar[inventory.selectedHotbar]; }
      
      function useCurrentItem() {
        const s = inventory.hotbar[inventory.selectedHotbar];
        if (s?.count > 0) {
          s.count--;
          if (s.count <= 0) inventory.hotbar[inventory.selectedHotbar] = { item: null, count: 0 };
          updateInventoryUI();
          return true;
        }
        return false;
      }

      function addItemToHotbar(itemId) {
        for (let i = 0; i < inventory.hotbar.length; i++) {
          if (!inventory.hotbar[i].item) {
            inventory.hotbar[i] = { item: itemId, count: 1 };
            updateInventoryUI();
            return true;
          }
        }
        return false;
      }

      // ==================== ЧАНКИ ====================
      const CHUNK_SIZE = 4;
      const WORLD_HEIGHT = 16;
      const RENDER_DISTANCE = 2;
      const chunks = new Map();
      let activeChunks = new Set();

      // ОДНА геометрия на все блоки
      const boxGeom = new THREE.BoxGeometry(1, 1, 1);

      class Chunk {
        constructor(cx, cz) {
          this.cx = cx; this.cz = cz;
          this.blocks = new Map();
          this.meshGroup = new THREE.Group();
          this.generated = false;
        }

        generate() {
          const startX = this.cx * CHUNK_SIZE;
          const startZ = this.cz * CHUNK_SIZE;
          
          for (let x = 0; x < CHUNK_SIZE; x++) {
            for (let z = 0; z < CHUNK_SIZE; z++) {
              const wx = startX + x;
              const wz = startZ + z;
              
              // Простая генерация
              const h = Math.floor(Math.sin(wx * 0.5) * Math.cos(wz * 0.5) * 3 + 8);
              
              for (let y = 0; y < WORLD_HEIGHT; y++) {
                let type = null;
                if (y === 0) type = 'stone';
                else if (y < h - 2) type = 'stone';
                else if (y < h - 1) type = 'dirt';
                else if (y === h) type = 'grass';
                else if (y < h) type = 'dirt';
                
                if (type) {
                  const materials = getMaterialsForBlock(type);
                  const mesh = new THREE.Mesh(boxGeom, materials);
                  mesh.position.set(wx, y, wz);
                  mesh.userData = { type, x: wx, y, z: wz };
                  this.blocks.set(`${wx},${y},${wz}`, mesh);
                  this.meshGroup.add(mesh);
                }
              }
            }
          }
          this.generated = true;
        }

        show() { 
          if (!this.generated) this.generate(); 
          scene.add(this.meshGroup); 
        }
        
        hide() { scene.remove(this.meshGroup); }
        
        removeBlock(x, y, z) {
          const key = `${x},${y},${z}`;
          const mesh = this.blocks.get(key);
          if (mesh) {
            this.meshGroup.remove(mesh);
            this.blocks.delete(key);
            return true;
          }
          return false;
        }
        
        addBlock(x, y, z, type) {
          const materials = getMaterialsForBlock(type);
          const mesh = new THREE.Mesh(boxGeom, materials);
          mesh.position.set(x, y, z);
          mesh.userData = { type, x, y, z };
          this.blocks.set(`${x},${y},${z}`, mesh);
          this.meshGroup.add(mesh);
        }
      }

      function getChunkKey(cx, cz) { return `${cx},${cz}`; }

      function updateChunks() {
        const cx = Math.floor(camera.position.x / CHUNK_SIZE);
        const cz = Math.floor(camera.position.z / CHUNK_SIZE);
        
        let total = 0;
        const newActive = new Set();
        
        for (let dx = -RENDER_DISTANCE; dx <= RENDER_DISTANCE; dx++) {
          for (let dz = -RENDER_DISTANCE; dz <= RENDER_DISTANCE; dz++) {
            const k = getChunkKey(cx + dx, cz + dz);
            newActive.add(k);
            
            if (!chunks.has(k)) {
              const c = new Chunk(cx + dx, cz + dz);
              chunks.set(k, c);
              c.show();
            } else {
              const c = chunks.get(k);
              if (!c.meshGroup.parent) c.show();
            }
            if (chunks.has(k)) total += chunks.get(k).blocks.size;
          }
        }
        
        for (const [k, c] of chunks) {
          if (!newActive.has(k) && c.meshGroup.parent) c.hide();
        }
        
        activeChunks = newActive;
        document.getElementById('chunk-info').innerHTML = `Чанк: ${cx},${cz} | Блоков: ${total}`;
      }

      // ==================== УПРАВЛЕНИЕ ====================
      const control = { w:0, a:0, s:0, d:0, q:0, e:0, mx:0, my:0, flyUp:0, flyDown:0 };
      let pitch = -0.3, yaw = 0.8;
      const speed = 0.2;

      // Клавиши
      window.addEventListener('keydown', e => {
        switch(e.code) {
          case 'KeyW': control.w = 1; e.preventDefault(); break;
          case 'KeyA': control.a = 1; e.preventDefault(); break;
          case 'KeyS': control.s = 1; e.preventDefault(); break;
          case 'KeyD': control.d = 1; e.preventDefault(); break;
          case 'KeyQ': control.q = 1; e.preventDefault(); break;
          case 'KeyE': control.e = 1; e.preventDefault(); break;
          case 'KeyI': inventoryVisible = !inventoryVisible; 
                      document.getElementById('inventory-panel').className = inventoryVisible ? 'visible' : ''; 
                      e.preventDefault(); break;
          case 'Digit1': inventory.selectedHotbar = 0; updateInventoryUI(); break;
          case 'Digit2': inventory.selectedHotbar = 1; updateInventoryUI(); break;
          case 'Digit3': inventory.selectedHotbar = 2; updateInventoryUI(); break;
          case 'Digit4': inventory.selectedHotbar = 3; updateInventoryUI(); break;
          case 'Digit5': inventory.selectedHotbar = 4; updateInventoryUI(); break;
          case 'Digit6': inventory.selectedHotbar = 5; updateInventoryUI(); break;
          case 'Digit7': inventory.selectedHotbar = 6; updateInventoryUI(); break;
          case 'Digit8': inventory.selectedHotbar = 7; updateInventoryUI(); break;
        }
      });
      
      window.addEventListener('keyup', e => {
        switch(e.code) {
          case 'KeyW': control.w = 0; e.preventDefault(); break;
          case 'KeyA': control.a = 0; e.preventDefault(); break;
          case 'KeyS': control.s = 0; e.preventDefault(); break;
          case 'KeyD': control.d = 0; e.preventDefault(); break;
          case 'KeyQ': control.q = 0; e.preventDefault(); break;
          case 'KeyE': control.e = 0; e.preventDefault(); break;
        }
      });

      // Мышь
      renderer.domElement.addEventListener('click', () => renderer.domElement.requestPointerLock());
      
      document.addEventListener('mousemove', e => {
        if (document.pointerLockElement === renderer.domElement) {
          yaw -= e.movementX * 0.002;
          pitch -= e.movementY * 0.002;
          pitch = Math.max(-1.5, Math.min(1.5, pitch));
        }
      });

      // Рейкаст
      const raycaster = new THREE.Raycaster();
      const rayDir = new THREE.Vector3();

      function breakBlock() {
        rayDir.copy(camera.getWorldDirection(rayDir));
        raycaster.set(camera.position, rayDir);
        const hits = raycaster.intersectObjects(scene.children, true);
        for (let h of hits) {
          if (h.object.userData.type) {
            const { x, y, z } = h.object.position;
            const cx = Math.floor(x / CHUNK_SIZE);
            const cz = Math.floor(z / CHUNK_SIZE);
            const chunk = chunks.get(getChunkKey(cx, cz));
            if (chunk) {
              const type = h.object.userData.type;
              chunk.removeBlock(x, y, z);
              addItemToHotbar(type);
            }
            return;
          }
        }
      }

      function placeBlock() {
        const cur = getCurrentItem();
        if (!cur?.item || !Registry.items[cur.item]?.blockId) return;
        
        rayDir.copy(camera.getWorldDirection(rayDir));
        raycaster.set(camera.position, rayDir);
        const hits = raycaster.intersectObjects(scene.children, true);
        for (let h of hits) {
          if (h.object.userData.type) {
            const { x, y, z } = h.object.position;
            const normal = h.face.normal;
            const nx = x + (normal.x > 0 ? 1 : normal.x < 0 ? -1 : 0);
            const ny = y + (normal.y > 0 ? 1 : normal.y < 0 ? -1 : 0);
            const nz = z + (normal.z > 0 ? 1 : normal.z < 0 ? -1 : 0);
            
            const cx = Math.floor(nx / CHUNK_SIZE);
            const cz = Math.floor(nz / CHUNK_SIZE);
            const chunk = chunks.get(getChunkKey(cx, cz));
            if (chunk && !chunk.blocks.has(`${nx},${ny},${nz}`)) {
              chunk.addBlock(nx, ny, nz, cur.item);
              useCurrentItem();
            }
            return;
          }
        }
      }

      document.addEventListener('mousedown', e => {
        if (document.pointerLockElement === renderer.domElement) {
          if (e.button === 0) breakBlock();
          else if (e.button === 2) placeBlock();
        }
      });
      
      document.addEventListener('contextmenu', e => e.preventDefault());

      // Джойстик (упрощенно)
      const jArea = document.getElementById('joystick-area');
      const jHandle = document.getElementById('joystick-handle');
      let jActive = false, jId = null, cId = null, lastX = null, lastY = null;
      
      jArea.addEventListener('touchstart', e => {
        e.preventDefault();
        const t = e.touches[0];
        jActive = true; jId = t.identifier;
      });
      
      jArea.addEventListener('touchmove', e => {
        e.preventDefault();
        if (!jActive) return;
        for (let t of e.touches) {
          if (t.identifier === jId) {
            const rect = jArea.getBoundingClientRect();
            const cx = rect.left + rect.width/2;
            const cy = rect.top + rect.height/2;
            let dx = t.clientX - cx;
            let dy = t.clientY - cy;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 40) { dx = (dx/dist)*40; dy = (dy/dist)*40; }
            jHandle.style.transform = `translate(${dx}px, ${dy}px)`;
            control.mx = dx/40;
            control.my = -dy/40;
            return;
          }
        }
      });
      
      jArea.addEventListener('touchend', e => {
        e.preventDefault();
        jActive = false; jId = null;
        jHandle.style.transform = 'translate(0px, 0px)';
        control.mx = 0; control.my = 0;
      });

      document.addEventListener('touchstart', e => {
        e.preventDefault();
        for (let t of e.touches) {
          const el = document.elementFromPoint(t.clientX, t.clientY);
          if (el?.className === 'flight-btn') {
            if (el.id === 'btn-up') control.flyUp = 1;
            if (el.id === 'btn-down') control.flyDown = 1;
          } else if (!el?.closest('#joystick-area') && cId === null) {
            cId = t.identifier;
            lastX = t.clientX; lastY = t.clientY;
          }
        }
      });

      document.addEventListener('touchmove', e => {
        e.preventDefault();
        for (let t of e.touches) {
          if (t.identifier === cId && lastX && lastY) {
            yaw -= (t.clientX - lastX) * 0.005;
            pitch -= (t.clientY - lastY) * 0.005;
            pitch = Math.max(-1.5, Math.min(1.5, pitch));
            lastX = t.clientX; lastY = t.clientY;
            return;
          }
        }
      });

      document.addEventListener('touchend', e => {
        e.preventDefault();
        if (cId) {
          let found = false;
          for (let t of e.touches) if (t.identifier === cId) { found = true; break; }
          if (!found) { cId = null; lastX = null; lastY = null; }
        }
        control.flyUp = 0; control.flyDown = 0;
      });

      // ==================== ДВИЖЕНИЕ ====================
      function move() {
        const dir = getVec().copy(camera.getWorldDirection(getVec()));
        const horiz = getVec().set(dir.x, 0, dir.z).normalize();
        const right = getVec().set(dir.z, 0, -dir.x).normalize();
        
        let moved = false;
        const ox = camera.position.x, oz = camera.position.z;
        
        if (control.w || control.s || control.a || control.d || control.mx || control.my) {
          if (control.w || control.s) {
            camera.position.addScaledVector(horiz, (control.w - control.s) * speed);
            moved = true;
          }
          if (control.a || control.d) {
            camera.position.addScaledVector(right, (control.d - control.a) * speed);
            moved = true;
          }
          if (control.mx || control.my) {
            camera.position.addScaledVector(right, control.mx * speed);
            camera.position.addScaledVector(horiz, control.my * speed);
            moved = true;
          }
        }
        
        if (control.q || control.e || control.flyUp || control.flyDown) {
          camera.position.y += (control.e - control.q + control.flyUp - control.flyDown) * speed;
        }
        
        if (moved) {
          const ncx = Math.floor(camera.position.x / CHUNK_SIZE);
          const ncz = Math.floor(camera.position.z / CHUNK_SIZE);
          if (ncx !== Math.floor(ox / CHUNK_SIZE) || ncz !== Math.floor(oz / CHUNK_SIZE)) {
            updateChunks();
          }
        }
        
        freeVec(dir); freeVec(horiz); freeVec(right);
      }

      // ==================== ОСВЕЩЕНИЕ ====================
      scene.add(new THREE.AmbientLight(0x404060));
      const light = new THREE.DirectionalLight(0xffffff, 1);
      light.position.set(10, 20, 10);
      scene.add(light);

      // ==================== СТАРТ ====================
      updateChunks();
      updateInventoryUI();

      document.getElementById('save-button').onclick = () => {
        localStorage.setItem('pos', JSON.stringify(camera.position));
        localStorage.setItem('inv', JSON.stringify(inventory));
        document.getElementById('save-button').innerHTML = '✅';
        setTimeout(() => document.getElementById('save-button').innerHTML = '💾', 1000);
      };
      
      document.getElementById('inventory-toggle').onclick = () => {
        inventoryVisible = !inventoryVisible;
        document.getElementById('inventory-panel').className = inventoryVisible ? 'visible' : '';
      };

      // Рендер с ограничением FPS
      function render(now) {
        requestAnimationFrame(render);
        if (now - lastFrame < 1000/fpsLimit) return;
        lastFrame = now;
        
        camera.rotation.order = 'YXZ';
        camera.rotation.set(pitch, yaw, 0);
        
        move();
        renderer.render(scene, camera);
      }
      requestAnimationFrame(render);

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    })();
  </script>
</body>
</html>
